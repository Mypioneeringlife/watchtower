name: Watchtower

on:
  workflow_dispatch:
  schedule:
    - cron: '7 13,1 * * *'

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Watchtower
        run: python watcher/watchtower.py --once

      - name: Commit Watchtower output
        run: |
          git config user.name "watchtower-bot"
          git config user.email "watchtower-bot@users.noreply.github.com"
          git add data/signals.json data/seen.json data/watcher-meta.json outbox/second-brain || true
          if git diff --cached --quiet; then
            echo "No Watchtower changes."
          else
            git commit -m "Update Watchtower signals"
            git push
          fi
